<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Keeper</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="btn-install" class="install-btn" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span>Install App</span>
    </button>

    <button id="btn-fullscreen" class="fullscreen-btn" aria-label="Toggle Fullscreen">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
        </svg>
    </button>

    <div class="app-container">
        <!-- Main Timer Display -->
        <div class="timer-section">
            <div class="timer-display-container">
                <div class="timer-display" id="main-timer">10:00</div>
            </div>
        </div>

        <!-- Controls Area -->
        <div class="controls-section">
            <div class="main-controls">
                <button id="btn-start" class="btn-massive btn-primary">Start</button>
                <button id="btn-pause" class="btn-massive btn-warning" style="display:none;">Pause</button>
                <button id="btn-reset" class="btn-massive btn-danger">Reset</button>
                <button id="btn-open-settings" class="btn-massive btn-secondary">Set</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Set Timer</h2>
                <button id="btn-close-modal" class="btn-close">&times;</button>
            </div>
            
            <div class="timer-settings">
                <p class="section-label">Quick Presets</p>
                <div class="presets">
                    <button class="btn-preset" data-time="1">1 Min</button>
                    <button class="btn-preset" data-time="3">3 Min</button>
                    <button class="btn-preset" data-time="10">10 Min</button>
                    <button class="btn-preset" data-time="15">15 Min</button>
                </div>
                
                <p class="section-label" style="margin-top: 1.5rem;">Manual Input</p>
                <div class="manual-input">
                    <input type="number" id="input-min" placeholder="Min" min="0" max="99">
                    <span>:</span>
                    <input type="number" id="input-sec" placeholder="Sec" min="0" max="59">
                    <button id="btn-set-manual" class="btn-set">Apply</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Alarm sound -->
    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('ServiceWorker registration successful');
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
